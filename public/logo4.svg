<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.78 0.1308 38.7559)" />
      <stop offset="100%" style="stop-color:oklch(0.6724 0.1308 38.7559)" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(0.6724 0.1308 38.7559)" />
      <stop offset="100%" style="stop-color:oklch(0.55 0.1308 38.7559)" />
    </linearGradient>
  </defs>
  
  <!-- Layered cards effect (representing stored images) -->
  <g transform="translate(400, 400)">
    <!-- Back layer -->
    <g opacity="0.3" transform="translate(-20, -20) rotate(-6)">
      <rect x="-140" y="-110" width="280" height="220" rx="28" fill="url(#mainGradient)"/>
    </g>
    
    <!-- Middle layer -->
    <g opacity="0.5" transform="translate(-10, -10) rotate(-3)">
      <rect x="-140" y="-110" width="280" height="220" rx="28" fill="url(#mainGradient)"/>
    </g>
    
    <!-- Front layer with icon -->
    <rect x="-140" y="-110" width="280" height="220" rx="28" fill="url(#mainGradient)"/>
    
    <!-- Camera/image icon in center -->
    <g opacity="0.95">
      <!-- Camera body -->
      <rect x="-70" y="-40" width="140" height="100" rx="16" fill="none" stroke="#fff" stroke-width="7"/>
      
      <!-- Lens -->
      <circle cx="0" cy="10" r="36" fill="none" stroke="#fff" stroke-width="7"/>
      <circle cx="0" cy="10" r="20" fill="#fff" opacity="0.25"/>
      
      <!-- Viewfinder -->
      <rect x="-16" y="-56" width="32" height="12" rx="4" fill="#fff"/>
      
      <!-- Flash indicator -->
      <circle cx="40" cy="-30" r="8" fill="#fff" opacity="0.6"/>
    </g>
    
    <!-- Cloud storage indicator at top right -->
    <g transform="translate(110, -150)" opacity="0.95">
      <ellipse cx="32" cy="20" rx="24" ry="16" fill="#fff"/>
      <ellipse cx="14" cy="24" rx="18" ry="14" fill="#fff"/>
      <ellipse cx="50" cy="24" rx="18" ry="14" fill="#fff"/>
      <rect x="14" y="24" width="36" height="12" fill="#fff"/>
    </g>
  </g>
  
  <!-- Upload arrow at bottom -->
  <g transform="translate(400, 620)" opacity="0.85">
    <path d="M 0 40 L 0 0 M 0 0 L -16 16 M 0 0 L 16 16" 
          stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="-24" y1="48" x2="24" y2="48" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>